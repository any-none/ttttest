name: Manual Register

on:
  workflow_dispatch:
    inputs:
      count:
        description: Number of accounts to register
        required: true
        default: "50"
      mode:
        description: Email mode (default or gmail)
        required: false
        default: "gmail"

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REGISTRATION_TARGETS_JSON: ${{ secrets.REGISTRATION_TARGETS_JSON }}
      GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
      MAIL_INBOX_URL: ${{ secrets.MAIL_INBOX_URL }}
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      target_count: ${{ steps.prepare.outputs.target_count }}
      job_count: ${{ steps.prepare.outputs.job_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare registration matrix
        id: prepare
        run: node scripts/build-action-matrix.js "${{ inputs.count }}" "${{ inputs.mode }}"

  register:
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.job_count != '0' }}
    name: register / slot ${{ matrix.slotNumber }} / count ${{ matrix.assignedCount }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    env:
      DDG_TOKEN: ${{ secrets.DDG_TOKEN }}
      REGISTRATION_TARGETS_JSON: ${{ secrets.REGISTRATION_TARGETS_JSON }}
      GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
      MAIL_INBOX_URL: ${{ secrets.MAIL_INBOX_URL }}
      CPA_URL: ${{ secrets.CPA_URL }}
      CPA_KEY: ${{ secrets.CPA_KEY }}
      OAUTH_CLIENT_ID: "app_EMoamEEZ73f0CkXaXp7hrann"
      OAUTH_REDIRECT_PORT: "1455"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Mask secrets
        shell: bash
        run: |
          echo "::add-mask::${DDG_TOKEN}"
          echo "::add-mask::${REGISTRATION_TARGETS_JSON}"
          echo "::add-mask::${GMAIL_EMAIL}"
          echo "::add-mask::${MAIL_INBOX_URL}"
          echo "::add-mask::${CPA_URL}"
          echo "::add-mask::${CPA_KEY}"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Select registration target
        run: node scripts/export-registration-target.js "${{ matrix.targetIndex }}" "${{ inputs.mode }}"

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "${MAIL_INBOX_URL}" || { echo "MAIL_INBOX_URL is required"; exit 1; }
          test -n "${CPA_URL}" || { echo "CPA_URL is required"; exit 1; }
          test -n "${CPA_KEY}" || { echo "CPA_KEY is required"; exit 1; }
          if [ "${{ inputs.mode }}" = "gmail" ]; then
            test -n "${GMAIL_EMAIL}" || { echo "GMAIL_EMAIL is required when mode=gmail"; exit 1; }
          fi

      - name: Register And Upload
        run: node index.js "${{ matrix.assignedCount }}" "${{ inputs.mode }}"
